function initDictionaryLookup() {
  const article = document.getElementById('article');
  if (!article) return;
  // Show one-time hint about double-click feature
  if (!localStorage.getItem('duet-dict-hint-shown')) {
    const hint = document.createElement('div');
    hint.className = 'dict-hint';
    hint.innerHTML = '💡 <strong>新功能</strong>：雙擊任何英文單字可查字典 · Double-click any word to look it up <button aria-label="Dismiss">×</button>';
    article.before(hint);
    hint.querySelector('button').addEventListener('click', () => {
      hint.remove();
      localStorage.setItem('duet-dict-hint-shown', '1');
    });
    setTimeout(() => { hint.remove(); localStorage.setItem('duet-dict-hint-shown', '1'); }, 12000);
  }
  async function lookup() {
    const sel = window.getSelection().toString().trim();
    if (!sel || sel.length > 40) return;
    // Allow hyphenated and apostrophes; first word only if multi-word selection
    const firstWord = sel.split(/\s+/)[0];
    const clean = firstWord.toLowerCase().replace(/[^a-z'\-]/g, '');
    if (!/^[a-z][a-z'\-]*$/.test(clean)) return;
    showDictPopup(clean, '<em>loading…</em>');
    try {
      const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(clean)}`);
      if (!r.ok) { showDictPopup(clean, '查無此字 / Not found in dictionary'); return; }
      const data = await r.json();
      renderDictData(clean, data[0]);
    } catch {
      showDictPopup(clean, '查詢失敗 / Lookup failed (network)');
    }
  }
  article.addEventListener('dblclick', lookup);
  // Keyboard shortcut: D when text is selected
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    if (e.key === 'd' || e.key === 'D') {
      const sel = window.getSelection().toString().trim();
      if (sel && sel.length > 0) lookup();
    }
  });
}

let _dictPopup = null;
function showDictPopup(word, msg) {
  closeDictPopup();
  const el = document.createElement('div');
  el.className = 'dict-popup';
  el.setAttribute('role', 'dialog');
  el.setAttribute('aria-label', `Dictionary lookup: ${word}`);
  el.innerHTML = `<div class="dp-head"><strong>${word}</strong><button class="dp-close" aria-label="Close dictionary">×</button></div><div class="dp-body">${msg}</div>`;
  document.body.appendChild(el);
  const closeBtn = el.querySelector('.dp-close');
  closeBtn.addEventListener('click', closeDictPopup);
  closeBtn.focus();  // focus trap entry
  _dictPopup = el;
  setTimeout(() => document.addEventListener('click', _dictDismiss), 50);
  document.addEventListener('keydown', _dictKey);
}
function _dictKey(e) { if (e.key === 'Escape') closeDictPopup(); }
function _dictDismiss(e) {
  if (_dictPopup && !_dictPopup.contains(e.target)) closeDictPopup();
}
function closeDictPopup() {
  if (_dictPopup) {
    _dictPopup.remove(); _dictPopup = null;
    document.removeEventListener('click', _dictDismiss);
    document.removeEventListener('keydown', _dictKey);
  }
}
function renderDictData(word, data) {
  const meanings = data.meanings || [];
  const phon = (data.phonetics || []).find(p => p.text)?.text || '';
  const audio = (data.phonetics || []).find(p => p.audio)?.audio;
  const meaningHtml = meanings.slice(0, 3).map(m => `
    <div class="dp-meaning">
      <span class="dp-pos">${m.partOfSpeech}</span>
      ${(m.definitions || []).slice(0, 2).map(d =>
        `<div class="dp-def">${escape(d.definition)}</div>` +
        (d.example ? `<div class="dp-ex">"${escape(d.example)}"</div>` : '')
      ).join('')}
    </div>`).join('');
  // Build a brief def for vocab review storage
  const briefDef = meanings[0]?.definitions?.[0]?.definition || '';
  const briefPos = meanings[0]?.partOfSpeech || '';
  if (_dictPopup) {
    _dictPopup.querySelector('.dp-body').innerHTML = `
      ${phon ? `<div class="dp-phon">${escape(phon)}</div>` : ''}
      <div class="dp-actions">
        ${audio ? `<button class="dp-speak" data-audio="${audio}">🔊 Pronounce</button>` : `<button class="dp-speak" data-text="${escape(word)}">🔊 Pronounce</button>`}
        <button class="dp-save" data-word="${escape(word)}">+ 加入單字本</button>
      </div>
      ${meaningHtml}`;
    const spkBtn = _dictPopup.querySelector('.dp-speak');
    if (audio) spkBtn.addEventListener('click', () => new Audio(audio).play());
    else spkBtn.addEventListener('click', () => Duet.speak(word));
    _dictPopup.querySelector('.dp-save').addEventListener('click', e => {
      saveToVocab({ term: word, ipa: phon, pos: briefPos, definition_en: briefDef, articleId: '__user__' , articleTitle: '我的單字本' });
      e.target.textContent = '✓ 已加入';
      e.target.disabled = true;
    });
  }
}

function saveToVocab(item) {
  // Persist into a personal vocab pool, picked up by vocab.html
  try {
    const key = 'duet-personal-vocab';
    const arr = JSON.parse(localStorage.getItem(key) || '[]');
    if (!arr.find(x => x.term.toLowerCase() === item.term.toLowerCase())) {
      arr.push({ ...item, addedAt: Date.now() });
      localStorage.setItem(key, JSON.stringify(arr));
    }
    Duet.showToast?.('📔 已加入單字本');
  } catch {}
}

// ── Read Aloud Player (paragraph-by-paragraph queue with controls) ──
function initReadAloudPlayer() {
  const playBtn = document.getElementById('ra-play');
  const prevBtn = document.getElementById('ra-prev');
  const pauseBtn = document.getElementById('ra-pause');
  const nextBtn = document.getElementById('ra-next');
  const stopBtn = document.getElementById('ra-stop');
  const status = document.getElementById('ra-status');
  if (!playBtn) return;

  let paragraphs = [], idx = 0, isPlaying = false, isPaused = false;
  const synth = window.speechSynthesis;
  if (!synth) { playBtn.disabled = true; status.textContent = 'Speech not supported'; return; }

  function refreshControls() {
    prevBtn.disabled = !isPlaying || idx <= 0;
    nextBtn.disabled = !isPlaying || idx >= paragraphs.length - 1;
    pauseBtn.disabled = !isPlaying;
    stopBtn.disabled = !isPlaying;
    pauseBtn.textContent = isPaused ? '▶︎' : '⏸';
    playBtn.classList.toggle('playing', isPlaying);
    playBtn.setAttribute('aria-pressed', isPlaying ? 'true' : 'false');
    pauseBtn.setAttribute('aria-pressed', isPaused ? 'true' : 'false');
    playBtn.querySelector('.ra-text').textContent = isPlaying ? '播放中…' : '朗讀全文 · Read aloud';
    playBtn.querySelector('.ra-icon').textContent = isPlaying ? '🔉' : '🔊';
  }

  function cleanText(t) {
    return t.replace(/[🔊🔉🔇🎵🎶▶︎⏸⏭⏮⏹]/g, '').replace(/\s+/g, ' ').trim();
  }

  let _raToken = 0; // cancel stale sentence queues on skip/prev/stop

  function speakCurrent() {
    const tok = ++_raToken;
    if (idx >= paragraphs.length) { stop(); return; }
    synth.cancel();
    const fullText = cleanText(paragraphs[idx].innerText);
    const lang = /[\u4e00-\u9fff]/.test(fullText) ? 'zh-TW' : 'en-US';
    const speedFactor = parseFloat(document.getElementById('ra-speed')?.value || '1');

    // Warm voice selection
    const voices = synth.getVoices();
    const wantEn = ['Samantha','Karen','Google UK English Female','Daniel','Microsoft Aria','Microsoft Zira'];
    const wantZh = ['Mei-Jia','Sin-ji','Tian-Tian','Google 普通話','Microsoft Xiaoxiao'];
    const wantList = lang.startsWith('zh') ? wantZh : wantEn;
    const match = voices.find(v => wantList.some(n => v.name.includes(n))) ||
                  voices.find(v => v.lang.startsWith(lang.split('-')[0]));

    // Audio ducking
    const bg = window._bgMusic, origVol = bg ? bg.volume : null;
    if (bg && !bg.paused) bg.volume = (origVol || 0.28) * 0.15;
    const restore = () => { if (bg && origVol != null) bg.volume = origVol; };

    // Highlight paragraph and scroll
    document.querySelectorAll('.article-en p.ra-current').forEach(p => p.classList.remove('ra-current'));
    paragraphs[idx].classList.add('ra-current');
    paragraphs[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    status.textContent = `第 ${idx+1} / ${paragraphs.length} 段`;
    refreshControls();

    // Sentence-by-sentence for natural rhythm and inter-sentence pauses
    const sentences = fullText.match(/[^.!?…]+[.!?…]["'»]?(?:\s|$)|[^.!?…]+$/g) || [fullText];
    let si = 0;

    function nextSentence() {
      if (tok !== _raToken || !isPlaying) return;
      if (isPaused) return; // will resume from pause handler
      if (si >= sentences.length) {
        restore(); idx++;
        setTimeout(() => { if (tok === _raToken && isPlaying) speakCurrent(); }, 320);
        return;
      }
      const sent = sentences[si].trim();
      if (!sent) { si++; nextSentence(); return; }
      const u = new SpeechSynthesisUtterance(sent);
      u.lang = lang;
      u.rate = speedFactor * 0.88; // slightly slower = warmer, more human
      u.pitch = 1.02;
      if (match) u.voice = match;
      u.onend = () => {
        if (tok !== _raToken) return;
        si++;
        // Short breath pause between sentences (~130 ms)
        setTimeout(nextSentence, 130);
      };
      u.onerror = e => { if (e.error !== 'interrupted') restore(); };
      synth.speak(u);
    }
    nextSentence();
  }

  function start() {
    paragraphs = [...document.querySelectorAll('.article-en p')];
    if (!paragraphs.length) return;
    idx = 0; isPlaying = true; isPaused = false;
    speakCurrent();
  }
  function stop() {
    synth.cancel();
    isPlaying = false; isPaused = false;
    document.querySelectorAll('.article-en p.ra-current').forEach(p => p.classList.remove('ra-current'));
    status.textContent = '';
    refreshControls();
  }

  playBtn.addEventListener('click', () => isPlaying ? stop() : start());
  pauseBtn.addEventListener('click', () => {
    if (!isPlaying) return;
    const bg = window._bgMusic;
    if (isPaused) {
      isPaused = false;
      synth.resume();
      // If synth had nothing queued (iOS/Safari clears on pause), restart sentence
      if (!synth.speaking) speakCurrent();
      if (bg && !bg.paused) bg.volume = 0.04;
    } else {
      synth.pause(); isPaused = true;
      if (bg) bg.volume = 0.28;
    }
    refreshControls();
  });
  // Speed change: restart current paragraph at new speed
  document.getElementById('ra-speed').addEventListener('change', () => {
    if (isPlaying) speakCurrent();
  });
  prevBtn.addEventListener('click', () => { if (idx > 0) { idx--; speakCurrent(); } });
  nextBtn.addEventListener('click', () => { if (idx < paragraphs.length - 1) { idx++; speakCurrent(); } });
  stopBtn.addEventListener('click', stop);

  refreshControls();
}

function initTooltipTap() {
  const popup = document.getElementById('term-popup');
  if (!popup) return;
  let dismissTimer = null;

  function showPopup(termEl) {
    clearTimeout(dismissTimer);
    const d = termEl.dataset;
    popup.querySelector('.tp-body').innerHTML =
      `<div class="tp-head"><span class="tp-term">${escape(d.term)}</span>${d.pos ? `<span class="tp-pos">${escape(d.pos)}</span>` : ''}</div>` +
      (d.trans ? `<div class="tp-trans">${escape(d.trans)}</div>` : '') +
      `<div class="tp-def">${escape(d.defEn)}</div>` +
      (d.defZh ? `<div class="tp-def-zh">${escape(d.defZh)}</div>` : '');

    // Measure before final positioning (visibility:hidden keeps layout intact)
    popup.style.visibility = 'hidden';
    popup.style.display = 'block';
    const rect = termEl.getBoundingClientRect();
    const pw = popup.offsetWidth, ph = popup.offsetHeight;
    // Prefer above; flip below if not enough room
    let top = rect.top - ph - 10;
    if (top < 8) top = rect.bottom + 10;   // flip below if not enough room above
    let left = rect.left + rect.width / 2 - pw / 2;
    // Clamp within viewport
    left = Math.max(8, Math.min(window.innerWidth - pw - 8, left));
    top  = Math.max(8, Math.min(window.innerHeight - ph - 8, top));
    popup.style.top = top + 'px';
    popup.style.left = left + 'px';
    popup.style.visibility = 'visible';
    dismissTimer = setTimeout(hidePopup, 7000);
  }

  function hidePopup() {
    popup.style.display = 'none';
    clearTimeout(dismissTimer);
  }

  popup.querySelector('.tp-close').addEventListener('click', hidePopup);

  document.addEventListener('click', e => {
    if (e.target.closest('.term-speak')) return;
    if (e.target.closest('#term-popup')) return;
    const term = e.target.closest('.term, .vocab-chip');
    if (term) {
      e.stopPropagation();
      showPopup(term);
    } else {
      hidePopup();
    }
  });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') hidePopup(); });
  // Hide on scroll so popup doesn't float away from its word
  window.addEventListener('scroll', hidePopup, { passive: true });
}

init().then(() => {
  initReadAloudPlayer();
  initDictionaryLookup();
  initReaderOnboarding();
});
initMusic();
initTooltipTap();

// ── First-reader-visit onboarding hint (3-step, non-modal) ──
function initReaderOnboarding() {
  if (localStorage.getItem('duet-reader-visited')) return;
  localStorage.setItem('duet-reader-visited', '1');
  const hint = document.createElement('div');
  hint.id = 'reader-onboarding';
  hint.setAttribute('role', 'status');
  hint.setAttribute('aria-live', 'polite');
  hint.innerHTML = `
    <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;">
      <span style="font-size:13px;font-weight:600;color:var(--accent);white-space:nowrap;">✦ 使用提示</span>
      <span style="font-size:13px;color:var(--ink-muted);">① 點<strong style="color:var(--accent)">藍色詞彙</strong>查看解釋 &nbsp;② 完成測驗解鎖單字卡 &nbsp;③ 去 <a href="vocab.html" style="color:var(--accent)">單字複習</a> 鞏固記憶</span>
      <button onclick="document.getElementById('reader-onboarding').remove()" aria-label="關閉提示" style="background:none;border:none;color:var(--ink-muted);cursor:pointer;font-size:16px;padding:0;line-height:1;flex-shrink:0;">✕</button>
    </div>`;
  hint.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg-card);border-top:1px solid var(--border);padding:12px 20px;animation:slide-up 0.3s ease;';
  document.body.appendChild(hint);
  setTimeout(() => hint?.remove(), 14000);
}
